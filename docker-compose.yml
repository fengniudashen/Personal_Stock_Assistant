# VibeSing 高音觉醒 - Docker Compose
# PostgreSQL + Redis + Label Studio + Celery Worker

version: '3.8'

services:
  # ====== PostgreSQL 数据库 ======
  postgres:
    image: postgres:15-alpine
    container_name: vibesing-postgres
    environment:
      POSTGRES_DB: vibesing
      POSTGRES_USER: vibesing
      POSTGRES_PASSWORD: vibesing_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibesing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====== Redis 消息队列 ======
  redis:
    image: redis:7-alpine
    container_name: vibesing-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ====== Label Studio 标注平台 ======
  labelstudio:
    image: heartexlabs/label-studio:latest
    container_name: vibesing-labelstudio
    environment:
      DJANGO_DB: default
      POSTGRE_NAME: vibesing
      POSTGRE_USER: vibesing
      POSTGRE_PASSWORD: vibesing_2024
      POSTGRE_HOST: postgres
      POSTGRE_PORT: 5432
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /data/clips
    volumes:
      - ls_data:/label-studio/data
      - ./data/clips:/data/clips:ro
      - ./frontend/labelstudio_plugin:/label-studio/plugins:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ====== FastAPI 后端 ======
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibesing-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://vibesing:vibesing_2024@postgres:5432/vibesing
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ====== Celery Worker ======
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibesing-celery
    command: celery -A api.tasks worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://vibesing:vibesing_2024@postgres:5432/vibesing
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  # ====== ML Backend (Label Studio) ======
  ml_backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibesing-ml-backend
    command: python frontend/labelstudio_plugin/ml_backend.py
    environment:
      DATABASE_URL: postgresql://vibesing:vibesing_2024@postgres:5432/vibesing
    volumes:
      - .:/app
      - ./data:/app/data
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  ls_data:
